# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

reviews:
  auto_review:
    enabled: false
    auto_incremental_review: false
    drafts: false
    ignore_usernames:
      - "dependabot[bot]"
      - "renovate[bot]"
      - "github-actions[bot]"
  path_filters:
    - "!**/dist/**"
    - "!**/coverage/**"
    - "!**/.turbo/**"
    - "!**/*.tsbuildinfo"
    - "!**/worker-configuration.d.ts"
