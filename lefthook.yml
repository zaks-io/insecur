# Local git hooks aligned with pnpm verify and docs/build-tooling.md.
# The CI workflow is the enforcement boundary; --no-verify is an accepted human escape hatch.
pre-commit:
  parallel: true
  jobs:
    - name: format-and-lint
      glob: "*.{ts,tsx}"
      group:
        piped: true
        jobs:
          - name: prettier
            run: pnpm exec prettier --write {staged_files}
            stage_fixed: true
          - name: eslint
            glob: "*.{ts,tsx}"
            exclude:
              - "scripts/lint-fixtures/**"
              - "**/*.gen.ts"
            # --no-warn-ignored: staging a generated/ignored file (e.g. *.gen.ts) must not trip
            # --max-warnings=0 with eslint's "File ignored by a matching ignore pattern" warning.
            run: pnpm exec eslint --fix --max-warnings=0 --no-warn-ignored {staged_files}
            stage_fixed: true

    - name: prettier-noncode
      glob: "*.{json,jsonc,md,yaml,yml}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true

    # Regenerate the public CLI docs when their sources change, and stage the result. The site
    # build regenerates too; this keeps the committed tree in lockstep so nobody runs
    # `pnpm docs:cli` by hand. CI enforces freshness via `pnpm docs:cli:check` in verify:policy.
    - name: docs-cli-generate
      glob:
        - "packages/cli/**"
        - "packages/domain/**"
        - "docs/cli-and-sync.md"
        - "scripts/docs/generate-cli-docs.mjs"
      run: pnpm docs:cli && git add apps/site/src/docs/content/cli apps/site/src/docs/content/reference/exit-codes.md apps/site/src/docs/content/reference/errors.md apps/site/src/generated/error-catalog.json

    - name: gitleaks
      run: |
        if command -v gitleaks >/dev/null 2>&1; then
          gitleaks protect --config .gitleaks.toml --staged --redact --no-banner
        else
          echo "gitleaks not installed; skipping staged secret scan (CI still runs gitleaks)."
        fi

    - name: typecheck
      run: pnpm exec turbo run typecheck --cache=local:rw,remote:r

pre-push:
  parallel: true
  jobs:
    # Pre-push mirrors the PR CI hot path: policy checks, affected Turbo checks,
    # and the full DB-less coverage ratchet.
    # Security scanners (semgrep, grype) stay CI-only: low frequency, not the hot path.
    - name: verify-pr
      run: pnpm verify:pr

    - name: test-coverage
      run: pnpm test:coverage
