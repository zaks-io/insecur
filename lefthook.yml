# Local git hooks aligned with pnpm verify and docs/build-tooling.md.
# The CI workflow is the enforcement boundary; --no-verify is an accepted human escape hatch.
pre-commit:
  parallel: true
  jobs:
    - name: format-and-lint
      glob: "*.{ts,tsx}"
      group:
        piped: true
        jobs:
          - name: prettier
            run: pnpm exec prettier --write {staged_files}
            stage_fixed: true
          - name: eslint
            glob: "*.{ts,tsx}"
            exclude: "scripts/lint-fixtures/**"
            run: pnpm exec eslint --fix --max-warnings=0 {staged_files}
            stage_fixed: true

    - name: prettier-noncode
      glob: "*.{json,jsonc,md,yaml,yml}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true

    - name: gitleaks
      run: |
        if command -v gitleaks >/dev/null 2>&1; then
          gitleaks protect --config .gitleaks.toml --staged --redact --no-banner
        else
          echo "gitleaks not installed; skipping staged secret scan (CI still runs gitleaks)."
        fi

    - name: typecheck
      run: pnpm exec turbo run typecheck --cache=local:rw,remote:r

pre-push:
  parallel: true
  jobs:
    # Pre-push mirrors the CI workflow's deterministic gate so the high-churn
    # failures (lint, types, tests, format, duplicates, knip, actionlint) are
    # caught here, not after a CI round-trip. `pnpm verify` is the same floor
    # CI's Verify job runs; test:coverage is CI's Coverage job. Security
    # scanners (semgrep, grype) stay CI-only: low frequency, not the hot path.
    - name: verify
      run: pnpm verify

    - name: test-coverage
      run: pnpm test:coverage
