# Deploy the bounded shared Preview Worker fleet. This is intentionally not a
# pull_request workflow: PRs use Docker Compose Postgres in CI, while this job
# targets the shared preview Worker deploys.
name: Deploy Preview

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-preview
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Preview
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 25
    environment:
      name: Preview
      url: ${{ steps.deploy.outputs.base_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.19.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Migrate preview database
        env:
          DATABASE_URL_MIGRATION: ${{ secrets.PREVIEW_DATABASE_URL_MIGRATION }}
          INSECUR_POSTGRES_RUNTIME_ROLE: ${{ vars.PREVIEW_POSTGRES_RUNTIME_ROLE }}
        run: pnpm migrate:preview

      - name: Deploy all preview Workers
        id: deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
        run: |
          pnpm deploy:preview
          echo "base_url=https://app.preview.insecur.cloud" >> "$GITHUB_OUTPUT"
