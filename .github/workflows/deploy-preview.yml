# Deploy the bounded shared Preview Worker fleet. This is intentionally not a
# pull_request workflow: PRs use Docker Compose Postgres in CI, while this job
# targets the shared preview Worker deploys.
name: Deploy Preview

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-preview
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Preview
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 25
    environment:
      name: Preview
      url: ${{ steps.deploy.outputs.base_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.19.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set deploy identity
        id: deploy_identity
        run: echo "deployed_at=$(date -u +'%Y-%m-%dT%H:%M:%S.000Z')" >> "$GITHUB_OUTPUT"

      - name: Validate preview deploy inputs
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          PREVIEW_DATABASE_URL_MIGRATION: ${{ secrets.PREVIEW_DATABASE_URL_MIGRATION }}
          RUNTIME_TOKEN_SIGNING_SECRET: ${{ secrets.RUNTIME_TOKEN_SIGNING_SECRET }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SESSION_SIGNING_SECRET: ${{ secrets.SESSION_SIGNING_SECRET }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          WORKOS_API_KEY: ${{ secrets.WORKOS_API_KEY }}
          WORKOS_COOKIE_PASSWORD: ${{ secrets.WORKOS_COOKIE_PASSWORD }}
          PREVIEW_INSTANCE_ID: ${{ vars.PREVIEW_INSTANCE_ID }}
          TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}
          WORKOS_CLIENT_ID: ${{ vars.WORKOS_CLIENT_ID }}
          WORKOS_AUTHKIT_ORIGIN: ${{ vars.WORKOS_AUTHKIT_ORIGIN }}
          PREVIEW_POSTGRES_RUNTIME_ROLE: ${{ vars.PREVIEW_POSTGRES_RUNTIME_ROLE }}
          PREVIEW_API_RATELIMIT_ONBOARDING_IP_NAMESPACE_ID: ${{ vars.PREVIEW_API_RATELIMIT_ONBOARDING_IP_NAMESPACE_ID }}
          PREVIEW_API_RATELIMIT_ONBOARDING_ACTOR_NAMESPACE_ID: ${{ vars.PREVIEW_API_RATELIMIT_ONBOARDING_ACTOR_NAMESPACE_ID }}
          PREVIEW_API_RATELIMIT_BOOTSTRAP_IP_NAMESPACE_ID: ${{ vars.PREVIEW_API_RATELIMIT_BOOTSTRAP_IP_NAMESPACE_ID }}
          PREVIEW_API_RATELIMIT_BOOTSTRAP_ACTOR_NAMESPACE_ID: ${{ vars.PREVIEW_API_RATELIMIT_BOOTSTRAP_ACTOR_NAMESPACE_ID }}
          PREVIEW_API_RATELIMIT_AUTH_EXCHANGE_IP_NAMESPACE_ID: ${{ vars.PREVIEW_API_RATELIMIT_AUTH_EXCHANGE_IP_NAMESPACE_ID }}
          PREVIEW_RUNTIME_ROOT_KEY_STORE_ID: ${{ vars.PREVIEW_RUNTIME_ROOT_KEY_STORE_ID }}
          PREVIEW_RUNTIME_ROOT_KEY_SECRET_NAME: ${{ vars.PREVIEW_RUNTIME_ROOT_KEY_SECRET_NAME }}
          PREVIEW_RUNTIME_AUDIT_EXPORT_HMAC_SECRET_NAME: ${{ vars.PREVIEW_RUNTIME_AUDIT_EXPORT_HMAC_SECRET_NAME }}
          PREVIEW_RUNTIME_AUDIT_EXPORT_SIGNING_SECRET_NAME: ${{ vars.PREVIEW_RUNTIME_AUDIT_EXPORT_SIGNING_SECRET_NAME }}
          PREVIEW_HYPERDRIVE_ID: ${{ vars.PREVIEW_HYPERDRIVE_ID }}
          PREVIEW_SMOKE_ADMITTED_USER_ID: ${{ vars.PREVIEW_SMOKE_ADMITTED_USER_ID }}
          PREVIEW_SMOKE_WORKOS_USER_ID: ${{ vars.PREVIEW_SMOKE_WORKOS_USER_ID }}
          PREVIEW_SMOKE_INVITEE_ADMITTED_USER_ID: ${{ vars.PREVIEW_SMOKE_INVITEE_ADMITTED_USER_ID }}
          PREVIEW_SMOKE_INVITEE_WORKOS_USER_ID: ${{ vars.PREVIEW_SMOKE_INVITEE_WORKOS_USER_ID }}
          PREVIEW_SMOKE_USER_ADMISSION_ID: ${{ vars.PREVIEW_SMOKE_USER_ADMISSION_ID }}
          PREVIEW_SMOKE_INVITEE_USER_ADMISSION_ID: ${{ vars.PREVIEW_SMOKE_INVITEE_USER_ADMISSION_ID }}
          PREVIEW_SMOKE_INSTANCE_OPERATOR_ID: ${{ vars.PREVIEW_SMOKE_INSTANCE_OPERATOR_ID }}
        run: |
          set -euo pipefail

          required=(
            CLOUDFLARE_ACCOUNT_ID
            CLOUDFLARE_API_TOKEN
            PREVIEW_DATABASE_URL_MIGRATION
            RUNTIME_TOKEN_SIGNING_SECRET
            SENTRY_AUTH_TOKEN
            SESSION_SIGNING_SECRET
            TURNSTILE_SECRET_KEY
            WORKOS_API_KEY
            WORKOS_COOKIE_PASSWORD
            PREVIEW_INSTANCE_ID
            TURNSTILE_SITE_KEY
            WORKOS_CLIENT_ID
            WORKOS_AUTHKIT_ORIGIN
            PREVIEW_POSTGRES_RUNTIME_ROLE
            PREVIEW_API_RATELIMIT_ONBOARDING_IP_NAMESPACE_ID
            PREVIEW_API_RATELIMIT_ONBOARDING_ACTOR_NAMESPACE_ID
            PREVIEW_API_RATELIMIT_BOOTSTRAP_IP_NAMESPACE_ID
            PREVIEW_API_RATELIMIT_BOOTSTRAP_ACTOR_NAMESPACE_ID
            PREVIEW_API_RATELIMIT_AUTH_EXCHANGE_IP_NAMESPACE_ID
            PREVIEW_RUNTIME_ROOT_KEY_STORE_ID
            PREVIEW_RUNTIME_ROOT_KEY_SECRET_NAME
            PREVIEW_RUNTIME_AUDIT_EXPORT_HMAC_SECRET_NAME
            PREVIEW_RUNTIME_AUDIT_EXPORT_SIGNING_SECRET_NAME
            PREVIEW_HYPERDRIVE_ID
            PREVIEW_SMOKE_ADMITTED_USER_ID
            PREVIEW_SMOKE_WORKOS_USER_ID
            PREVIEW_SMOKE_INVITEE_ADMITTED_USER_ID
            PREVIEW_SMOKE_INVITEE_WORKOS_USER_ID
            PREVIEW_SMOKE_USER_ADMISSION_ID
            PREVIEW_SMOKE_INVITEE_USER_ADMISSION_ID
            PREVIEW_SMOKE_INSTANCE_OPERATOR_ID
          )
          missing=0
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              if [ "$name" = "SENTRY_AUTH_TOKEN" ]; then
                echo "::error::$name is not configured for this deploy job. Add the repository Actions secret or an optional Preview environment override."
              else
                echo "::error::$name is not configured in the Preview GitHub Environment."
              fi
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Install Playwright Chromium
        run: pnpm --filter @insecur/preview-smoke exec playwright install --with-deps chromium

      - name: Preflight all preview Workers
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
          INSECUR_DEPLOY_SHA: ${{ github.sha }}
          INSECUR_DEPLOY_RUN_ID: ${{ github.run_id }}
          INSECUR_DEPLOYED_AT: ${{ steps.deploy_identity.outputs.deployed_at }}
          SENTRY_RELEASE: ${{ github.sha }}
          INSECUR_INSTANCE_ID: ${{ vars.PREVIEW_INSTANCE_ID }}
          INSECUR_TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}
          INSECUR_WORKOS_CLIENT_ID: ${{ vars.WORKOS_CLIENT_ID }}
          INSECUR_WORKOS_AUTHKIT_ORIGIN: ${{ vars.WORKOS_AUTHKIT_ORIGIN }}
          INSECUR_API_RATELIMIT_ONBOARDING_IP_NAMESPACE_ID: ${{ vars.PREVIEW_API_RATELIMIT_ONBOARDING_IP_NAMESPACE_ID }}
          INSECUR_API_RATELIMIT_ONBOARDING_ACTOR_NAMESPACE_ID: ${{ vars.PREVIEW_API_RATELIMIT_ONBOARDING_ACTOR_NAMESPACE_ID }}
          INSECUR_API_RATELIMIT_BOOTSTRAP_IP_NAMESPACE_ID: ${{ vars.PREVIEW_API_RATELIMIT_BOOTSTRAP_IP_NAMESPACE_ID }}
          INSECUR_API_RATELIMIT_BOOTSTRAP_ACTOR_NAMESPACE_ID: ${{ vars.PREVIEW_API_RATELIMIT_BOOTSTRAP_ACTOR_NAMESPACE_ID }}
          INSECUR_API_RATELIMIT_AUTH_EXCHANGE_IP_NAMESPACE_ID: ${{ vars.PREVIEW_API_RATELIMIT_AUTH_EXCHANGE_IP_NAMESPACE_ID }}
          INSECUR_RUNTIME_ROOT_KEY_STORE_ID: ${{ vars.PREVIEW_RUNTIME_ROOT_KEY_STORE_ID }}
          INSECUR_RUNTIME_ROOT_KEY_SECRET_NAME: ${{ vars.PREVIEW_RUNTIME_ROOT_KEY_SECRET_NAME }}
          INSECUR_RUNTIME_AUDIT_EXPORT_HMAC_SECRET_NAME: ${{ vars.PREVIEW_RUNTIME_AUDIT_EXPORT_HMAC_SECRET_NAME }}
          INSECUR_RUNTIME_AUDIT_EXPORT_SIGNING_SECRET_NAME: ${{ vars.PREVIEW_RUNTIME_AUDIT_EXPORT_SIGNING_SECRET_NAME }}
          INSECUR_RUNTIME_HYPERDRIVE_ID: ${{ vars.PREVIEW_HYPERDRIVE_ID }}
        run: pnpm deploy:preview:preflight

      - name: Migrate preview database
        env:
          DATABASE_URL_MIGRATION: ${{ secrets.PREVIEW_DATABASE_URL_MIGRATION }}
          INSECUR_POSTGRES_RUNTIME_ROLE: ${{ vars.PREVIEW_POSTGRES_RUNTIME_ROLE }}
        run: pnpm migrate:preview

      - name: Seed preview smoke actors
        env:
          DATABASE_URL_MIGRATION: ${{ secrets.PREVIEW_DATABASE_URL_MIGRATION }}
          INSTANCE_ID: ${{ vars.PREVIEW_INSTANCE_ID }}
          SMOKE_ADMITTED_USER_ID: ${{ vars.PREVIEW_SMOKE_ADMITTED_USER_ID }}
          SMOKE_WORKOS_USER_ID: ${{ vars.PREVIEW_SMOKE_WORKOS_USER_ID }}
          SMOKE_INVITEE_ADMITTED_USER_ID: ${{ vars.PREVIEW_SMOKE_INVITEE_ADMITTED_USER_ID }}
          SMOKE_INVITEE_WORKOS_USER_ID: ${{ vars.PREVIEW_SMOKE_INVITEE_WORKOS_USER_ID }}
          SMOKE_USER_ADMISSION_ID: ${{ vars.PREVIEW_SMOKE_USER_ADMISSION_ID }}
          SMOKE_INVITEE_USER_ADMISSION_ID: ${{ vars.PREVIEW_SMOKE_INVITEE_USER_ADMISSION_ID }}
          SMOKE_INSTANCE_OPERATOR_ID: ${{ vars.PREVIEW_SMOKE_INSTANCE_OPERATOR_ID }}
        run: node packages/tenant-store/scripts/seed-preview-smoke-admission.mjs

      - name: Deploy all preview Workers
        id: deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
          INSECUR_DEPLOY_SHA: ${{ github.sha }}
          INSECUR_DEPLOY_RUN_ID: ${{ github.run_id }}
          INSECUR_DEPLOYED_AT: ${{ steps.deploy_identity.outputs.deployed_at }}
          INSECUR_REQUIRE_SENTRY_SOURCEMAPS: "true"
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: zaksio
          SENTRY_PROJECT: insecur
          SENTRY_RELEASE: ${{ github.sha }}
          INSECUR_INSTANCE_ID: ${{ vars.PREVIEW_INSTANCE_ID }}
          INSECUR_TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}
          INSECUR_WORKOS_CLIENT_ID: ${{ vars.WORKOS_CLIENT_ID }}
          INSECUR_WORKOS_AUTHKIT_ORIGIN: ${{ vars.WORKOS_AUTHKIT_ORIGIN }}
          INSECUR_API_RATELIMIT_ONBOARDING_IP_NAMESPACE_ID: ${{ vars.PREVIEW_API_RATELIMIT_ONBOARDING_IP_NAMESPACE_ID }}
          INSECUR_API_RATELIMIT_ONBOARDING_ACTOR_NAMESPACE_ID: ${{ vars.PREVIEW_API_RATELIMIT_ONBOARDING_ACTOR_NAMESPACE_ID }}
          INSECUR_API_RATELIMIT_BOOTSTRAP_IP_NAMESPACE_ID: ${{ vars.PREVIEW_API_RATELIMIT_BOOTSTRAP_IP_NAMESPACE_ID }}
          INSECUR_API_RATELIMIT_BOOTSTRAP_ACTOR_NAMESPACE_ID: ${{ vars.PREVIEW_API_RATELIMIT_BOOTSTRAP_ACTOR_NAMESPACE_ID }}
          INSECUR_API_RATELIMIT_AUTH_EXCHANGE_IP_NAMESPACE_ID: ${{ vars.PREVIEW_API_RATELIMIT_AUTH_EXCHANGE_IP_NAMESPACE_ID }}
          INSECUR_RUNTIME_ROOT_KEY_STORE_ID: ${{ vars.PREVIEW_RUNTIME_ROOT_KEY_STORE_ID }}
          INSECUR_RUNTIME_ROOT_KEY_SECRET_NAME: ${{ vars.PREVIEW_RUNTIME_ROOT_KEY_SECRET_NAME }}
          INSECUR_RUNTIME_AUDIT_EXPORT_HMAC_SECRET_NAME: ${{ vars.PREVIEW_RUNTIME_AUDIT_EXPORT_HMAC_SECRET_NAME }}
          INSECUR_RUNTIME_AUDIT_EXPORT_SIGNING_SECRET_NAME: ${{ vars.PREVIEW_RUNTIME_AUDIT_EXPORT_SIGNING_SECRET_NAME }}
          INSECUR_RUNTIME_HYPERDRIVE_ID: ${{ vars.PREVIEW_HYPERDRIVE_ID }}
          RUNTIME_TOKEN_SIGNING_SECRET: ${{ secrets.RUNTIME_TOKEN_SIGNING_SECRET }}
          SESSION_SIGNING_SECRET: ${{ secrets.SESSION_SIGNING_SECRET }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          WORKOS_API_KEY: ${{ secrets.WORKOS_API_KEY }}
          WORKOS_COOKIE_PASSWORD: ${{ secrets.WORKOS_COOKIE_PASSWORD }}
        run: |
          set -euo pipefail

          required=(
            CLOUDFLARE_ACCOUNT_ID
            CLOUDFLARE_API_TOKEN
            RUNTIME_TOKEN_SIGNING_SECRET
            SENTRY_AUTH_TOKEN
            SESSION_SIGNING_SECRET
            TURNSTILE_SECRET_KEY
            INSECUR_TURNSTILE_SITE_KEY
            WORKOS_API_KEY
            WORKOS_COOKIE_PASSWORD
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              if [ "$name" = "SENTRY_AUTH_TOKEN" ]; then
                echo "::error::$name is not configured for this deploy job. Add the repository Actions secret or an optional Preview environment override."
              else
                echo "::error::$name is not configured in the Preview GitHub Environment."
              fi
              exit 1
            fi
          done

          secret_dir="$(mktemp -d)"
          trap 'rm -rf "$secret_dir"' EXIT

          export INSECUR_RUNTIME_SECRETS_FILE="$secret_dir/runtime-preview-secrets.json"
          export INSECUR_API_SECRETS_FILE="$secret_dir/api-preview-secrets.json"
          export INSECUR_WEB_SECRETS_FILE="$secret_dir/web-preview-secrets.json"

          jq -n --arg value "$RUNTIME_TOKEN_SIGNING_SECRET" \
            '{ RUNTIME_TOKEN_SIGNING_SECRET: $value }' > "$INSECUR_RUNTIME_SECRETS_FILE"

          jq -n \
            --arg runtime "$RUNTIME_TOKEN_SIGNING_SECRET" \
            --arg session "$SESSION_SIGNING_SECRET" \
            --arg workos "$WORKOS_API_KEY" \
            --arg cookie "$WORKOS_COOKIE_PASSWORD" \
            '{
              RUNTIME_TOKEN_SIGNING_SECRET: $runtime,
              SESSION_SIGNING_SECRET: $session,
              WORKOS_API_KEY: $workos,
              WORKOS_COOKIE_PASSWORD: $cookie
            }' > "$INSECUR_API_SECRETS_FILE"

          jq -n \
            --arg session "$SESSION_SIGNING_SECRET" \
            --arg turnstile "$TURNSTILE_SECRET_KEY" \
            --arg workos "$WORKOS_API_KEY" \
            --arg cookie "$WORKOS_COOKIE_PASSWORD" \
            '{
              SESSION_SIGNING_SECRET: $session,
              TURNSTILE_SECRET_KEY: $turnstile,
              WORKOS_API_KEY: $workos,
              WORKOS_COOKIE_PASSWORD: $cookie
            }' > "$INSECUR_WEB_SECRETS_FILE"

          chmod 600 "$INSECUR_RUNTIME_SECRETS_FILE" "$INSECUR_API_SECRETS_FILE" "$INSECUR_WEB_SECRETS_FILE"

          pnpm deploy:preview
          echo "base_url=https://app.preview.insecur.cloud" >> "$GITHUB_OUTPUT"

      - name: Verify Sentry source maps for preview release
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: zaksio
          SENTRY_PROJECT: insecur
          SENTRY_RELEASE: ${{ github.sha }}
        run: node scripts/sentry-verify-release-sourcemaps.mjs

      - name: Run preview application smoke
        env:
          PREVIEW_DATABASE_URL_MIGRATION: ${{ secrets.PREVIEW_DATABASE_URL_MIGRATION }}
          SMOKE_API_BASE_URL: https://api.preview.insecur.cloud
          SMOKE_WEB_BASE_URL: https://app.preview.insecur.cloud
          SMOKE_SITE_BASE_URL: https://preview.insecur.cloud
          SMOKE_EXPECTED_DEPLOY_SHA: ${{ github.sha }}
          SMOKE_SESSION_SIGNING_SECRET: ${{ secrets.SESSION_SIGNING_SECRET }}
          SMOKE_ADMITTED_USER_ID: ${{ vars.PREVIEW_SMOKE_ADMITTED_USER_ID }}
          SMOKE_WORKOS_USER_ID: ${{ vars.PREVIEW_SMOKE_WORKOS_USER_ID }}
          SMOKE_INVITEE_ADMITTED_USER_ID: ${{ vars.PREVIEW_SMOKE_INVITEE_ADMITTED_USER_ID }}
          SMOKE_INVITEE_WORKOS_USER_ID: ${{ vars.PREVIEW_SMOKE_INVITEE_WORKOS_USER_ID }}
        run: pnpm smoke:preview

      - name: Upload preview smoke artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: preview-smoke-artifacts
          path: preview-smoke-artifacts/**
          if-no-files-found: error
          retention-days: 14
