# Reusable Linear release stage for the Daily Release train.
name: Linear Release Stage

on:
  workflow_call:
    inputs:
      command:
        description: "Linear Release command: sync, update, or complete"
        required: true
        type: string
      deploy_sha:
        description: Exact release candidate identity
        required: true
        type: string
      stage:
        description: Scheduled pipeline stage for update commands
        required: false
        type: string
    secrets:
      LINEAR_ACCESS_KEY:
        required: true

permissions:
  contents: read

jobs:
  release:
    name: Linear ${{ inputs.command }}${{ inputs.stage && format(' ({0})', inputs.stage) || '' }}
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    steps:
      - name: Checkout release candidate
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ inputs.deploy_sha }}

      - name: Validate Linear stage command
        env:
          COMMAND: ${{ inputs.command }}
          STAGE: ${{ inputs.stage }}
        run: |
          set -euo pipefail
          case "$COMMAND" in
            sync|complete) ;;
            update)
              if [ -z "$STAGE" ]; then
                echo "::error::Linear update requires a stage."
                exit 1
              fi
              ;;
            *)
              echo "::error::Unsupported Linear release command: $COMMAND"
              exit 1
              ;;
          esac

      - name: Fetch production release baseline
        if: inputs.command == 'sync'
        run: git fetch --no-tags origin refs/heads/production:refs/remotes/origin/production

      - name: Sync Linear release
        if: inputs.command == 'sync'
        uses: linear/linear-release-action@c0cb8354a362c24c6d3e0948f37fd66d07588e3f # v0.14.5
        with:
          access_key: ${{ secrets.LINEAR_ACCESS_KEY }}
          command: sync
          name: ${{ inputs.deploy_sha }}
          version: ${{ inputs.deploy_sha }}
          base_ref: refs/remotes/origin/production
          include_paths: "apps/api/**,apps/runtime/**,apps/site/**,apps/web/**,packages/access/**,packages/agent-attribution/**,packages/app-connection/**,packages/audit/**,packages/auth/**,packages/backup-restore/**,packages/crypto/**,packages/custody-contracts/**,packages/domain/**,packages/high-assurance/**,packages/instance-bootstrap/**,packages/machine-auth/**,packages/notifications/**,packages/observability/**,packages/onboarding/**,packages/operations/**,packages/protected-change/**,packages/runtime-injection/**,packages/runtime-injection-issue/**,packages/secret-store/**,packages/secret-store-contracts/**,packages/secret-sync/**,packages/storage-security-gate/**,packages/tenant-keyring/**,packages/tenant-store/**,packages/token-signing/**,packages/ui/**,packages/worker-kit/**"
          links: |
            Daily Release=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Commit=${{ github.server_url }}/${{ github.repository }}/commit/${{ inputs.deploy_sha }}

      - name: Set initial Linear release stage
        if: inputs.command == 'sync' && inputs.stage != ''
        uses: linear/linear-release-action@c0cb8354a362c24c6d3e0948f37fd66d07588e3f # v0.14.5
        with:
          access_key: ${{ secrets.LINEAR_ACCESS_KEY }}
          command: update
          version: ${{ inputs.deploy_sha }}
          stage: ${{ inputs.stage }}
          links: |
            Daily Release=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Commit=${{ github.server_url }}/${{ github.repository }}/commit/${{ inputs.deploy_sha }}

      - name: Update Linear release stage
        if: inputs.command == 'update'
        uses: linear/linear-release-action@c0cb8354a362c24c6d3e0948f37fd66d07588e3f # v0.14.5
        with:
          access_key: ${{ secrets.LINEAR_ACCESS_KEY }}
          command: update
          version: ${{ inputs.deploy_sha }}
          stage: ${{ inputs.stage }}
          links: |
            Daily Release=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Commit=${{ github.server_url }}/${{ github.repository }}/commit/${{ inputs.deploy_sha }}

      - name: Complete Linear release
        if: inputs.command == 'complete'
        uses: linear/linear-release-action@c0cb8354a362c24c6d3e0948f37fd66d07588e3f # v0.14.5
        with:
          access_key: ${{ secrets.LINEAR_ACCESS_KEY }}
          command: complete
          version: ${{ inputs.deploy_sha }}
          links: |
            Daily Release=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Commit=${{ github.server_url }}/${{ github.repository }}/commit/${{ inputs.deploy_sha }}
