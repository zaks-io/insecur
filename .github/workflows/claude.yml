name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write
  id-token: write
  checks: write

jobs:
  claude:
    if: |
      (github.event_name != 'issue_comment' || github.event.comment.user.type != 'Bot') &&
      (github.event_name != 'pull_request_review_comment' || github.event.comment.user.type != 'Bot') &&
      (github.event_name != 'pull_request_review' || github.event.review.user.type != 'Bot') &&
      (
        github.event_name != 'issue_comment' ||
        (
          github.event.comment.body != '/review' &&
          !startsWith(github.event.comment.body, '/review ')
        )
      )
    # Upstream has no semver tags; pinned to main HEAD as of 2026-07-09.
    # Bump SHA to update; review diff before bumping.
    uses: zaks-io/claude-code-action/.github/workflows/claude.yml@4d69fab609213bb3ee05991639d6fe7ed65e6cb1
    secrets:
      claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

  code-review:
    name: Manual Code Review
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      github.event.comment.user.type != 'Bot' &&
      (
        github.event.comment.body == '/review' ||
        startsWith(github.event.comment.body, '/review ')
      )
    uses: zaks-io/claude-code-action/.github/workflows/code-review.yml@4d69fab609213bb3ee05991639d6fe7ed65e6cb1
    secrets:
      claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
