# Required status check: deterministic validation with no secrets (fork-safe).
# Branch protection keys on the Verify job name, not the workflow name. See
# docs/build-tooling.md and ADR-0029 / ADR-0061.
name: CI

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    outputs:
      db_backed: ${{ steps.diff.outputs.db_backed }}
      product_code: ${{ steps.diff.outputs.product_code }}
      workflow_config: ${{ steps.diff.outputs.workflow_config }}
      security_docs: ${{ steps.diff.outputs.security_docs }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" != "pull_request" ] || [ -z "${BASE_SHA:-}" ]; then
            {
              echo "db_backed=true"
              echo "product_code=true"
              echo "workflow_config=true"
              echo "security_docs=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          db_backed=false
          product_code=false
          workflow_config=false
          security_docs=false

          # Capture the diff before iterating so errexit fails the job if git errors
          # (process substitution would swallow the failure and short-circuit as
          # docs-only). --no-renames keeps both endpoints of a rename classified.
          changed_files="$(git diff --no-renames --name-only "${BASE_SHA}...HEAD")"

          while IFS= read -r file_path; do
            [ -z "$file_path" ] && continue
            case "$file_path" in
              # Security owner documents (ADR-0067): docs-only PRs must still run their
              # conformance gates, so classify them ahead of the docs catch-all (INS-587).
              SECURITY.md|\
              docs/specs/deploy-route-inventory.md|\
              docs/specs/deploy-route-inventory.sidecar.json)
                security_docs=true
                ;;
              docs/*|*.md) ;;
              .github/workflows/*|.github/actionlint.yaml|.github/actions/*) workflow_config=true ;;
              *) product_code=true ;;
            esac
            case "$file_path" in
              apps/api/*|\
              apps/runtime/*|\
              apps/web/*|\
              packages/cli/*|\
              packages/access/*|\
              packages/agent-attribution/*|\
              packages/app-connection/*|\
              packages/audit/*|\
              packages/auth/*|\
              packages/backup-restore/*|\
              packages/instance-bootstrap/*|\
              packages/machine-auth/*|\
              packages/notifications/*|\
              packages/onboarding/*|\
              packages/operations/*|\
              packages/protected-change/*|\
              packages/runtime-injection/*|\
              packages/secret-sync/*|\
              packages/secret-store/*|\
              packages/tenant-store/*|\
              compose.yaml|\
              infra/postgres/*|\
              package.json|\
              pnpm-lock.yaml|\
              pnpm-workspace.yaml|\
              scripts/ci/postgres-integration-tests.mjs|\
              scripts/dev-db.mjs|\
              scripts/local-smoke.mjs|\
              turbo.json)
                db_backed=true
                ;;
            esac
          done <<< "$changed_files"

          {
            echo "db_backed=$db_backed"
            echo "product_code=$product_code"
            echo "workflow_config=$workflow_config"
            echo "security_docs=$security_docs"
          } >> "$GITHUB_OUTPUT"

  verify:
    name: Verify
    needs: changes
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Secret scan
        run: |
          bash scripts/ci/install-gitleaks.sh
          bash scripts/ci/gitleaks-detect.sh detect

      - name: Setup pnpm
        if: needs.changes.outputs.product_code == 'true' || needs.changes.outputs.workflow_config == 'true' || needs.changes.outputs.security_docs == 'true'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.19.0

      - name: Setup Node.js
        if: needs.changes.outputs.product_code == 'true' || needs.changes.outputs.workflow_config == 'true' || needs.changes.outputs.security_docs == 'true'
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Install dependencies
        if: needs.changes.outputs.product_code == 'true' || needs.changes.outputs.workflow_config == 'true' || needs.changes.outputs.security_docs == 'true'
        run: pnpm install --frozen-lockfile

      - name: Product checks
        if: needs.changes.outputs.product_code == 'true'
        env:
          EVENT_NAME: ${{ github.event_name }}
          # actions/checkout leaves HEAD detached with no local `main` branch, so Turbo's
          # `--affected` cannot resolve the PR base ref by name and falls back to "all changed".
          # Pin the base to the fetched base SHA (fetch-depth: 0) so the affected set is real.
          TURBO_SCM_BASE: ${{ github.event.pull_request.base.sha }}
          # Keep the remote-cache credentials (and therefore cache writes) away from
          # pull_request runs entirely: they execute the PR branch's unreviewed code, and a
          # token + signature key in that env would let it publish validly-signed artifacts
          # under hashes that post-merge builds — including production deploys — restore
          # instead of rebuilding. Trusted push/merge_group runs still write the cache.
          TURBO_TOKEN: ${{ (github.event_name == 'push' || github.event_name == 'merge_group') && secrets.TURBO_TOKEN || '' }}
          TURBO_TEAM: ${{ (github.event_name == 'push' || github.event_name == 'merge_group') && secrets.TURBO_TEAM || '' }}
          TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ (github.event_name == 'push' || github.event_name == 'merge_group') && secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY || '' }}
        run: |
          set -euo pipefail
          cache_flags="--cache=local:rw,remote:r"
          if [ -n "${TURBO_REMOTE_CACHE_SIGNATURE_KEY:-}" ] && [ -n "${TURBO_TOKEN:-}" ] && [ -n "${TURBO_TEAM:-}" ]; then
            cache_flags="--cache=local:rw,remote:rw"
            echo "Remote Turbo cache writes enabled (trusted push/merge_group runs only, signed)."
          else
            echo "::notice::Remote Turbo cache disabled for this run (pull_request runs never receive the cache credentials; on push/merge_group, configure TURBO_TOKEN, TURBO_TEAM, and TURBO_REMOTE_CACHE_SIGNATURE_KEY repository secrets to enable signed CI cache publication, ADR-0053)."
          fi
          export TURBO_CACHE="${cache_flags#--cache=}"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            pnpm verify:pr
          else
            pnpm verify
          fi
          pnpm test:coverage

      - name: Workflow config checks
        if: needs.changes.outputs.workflow_config == 'true'
        run: |
          if [ "${{ needs.changes.outputs.product_code }}" != "true" ]; then
            pnpm exec prettier --check ".github/workflows/*.{yml,yaml}" ".github/actions/**/*.{yml,yaml}" ".github/actionlint.yaml"
            pnpm conformance:actions-pin
            # Workflow-only PRs skip Product checks (verify:policy), so run the script
            # suite here: it holds the path-classifier and workflow regression tests
            # that guard against exactly this class of change (INS-587).
            pnpm test:scripts
          fi
          bash scripts/ci/install-actionlint.sh
          actionlint -color

      - name: Security owner-document conformance
        # Docs-only PRs skip Product checks, but the security owner documents (route
        # inventory + SECURITY.md, ADR-0067) must never bypass their conformance gates
        # (INS-587). Product checks already run these via verify:policy.
        if: needs.changes.outputs.security_docs == 'true' && needs.changes.outputs.product_code != 'true'
        run: |
          pnpm conformance:topology
          pnpm conformance:security-md

      - name: DB-backed tests
        if: needs.changes.outputs.product_code == 'true' && needs.changes.outputs.db_backed == 'true'
        run: |
          pnpm dev:db:reset
          node scripts/ci/postgres-integration-tests.mjs

      - name: Upload coverage report
        if: always() && needs.changes.outputs.product_code == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Docs-only short-circuit
        if: needs.changes.outputs.product_code != 'true' && needs.changes.outputs.workflow_config != 'true' && needs.changes.outputs.security_docs != 'true'
        run: echo "Docs-only change; skipping Verify."
