# Required status check: deterministic validation with no secrets (fork-safe).
# Branch protection keys on the Verify job name, not the workflow name. See
# docs/build-tooling.md and ADR-0029 / ADR-0061.
name: CI

on:
  pull_request:
  merge_group:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    outputs:
      db_backed: ${{ steps.diff.outputs.db_backed }}
      product_code: ${{ steps.diff.outputs.product_code }}
      workflow_config: ${{ steps.diff.outputs.workflow_config }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" != "pull_request" ] || [ -z "${BASE_SHA:-}" ]; then
            {
              echo "db_backed=true"
              echo "product_code=true"
              echo "workflow_config=true"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          db_backed=false
          product_code=false
          workflow_config=false

          while IFS= read -r file_path; do
            [ -z "$file_path" ] && continue
            case "$file_path" in
              docs/*|*.md) ;;
              .github/workflows/*|.github/actionlint.yaml|.github/actions/*) workflow_config=true ;;
              *) product_code=true ;;
            esac
            case "$file_path" in
              apps/api/*|\
              apps/runtime/*|\
              apps/web/*|\
              packages/cli/*|\
              packages/access/*|\
              packages/agent-attribution/*|\
              packages/app-connection/*|\
              packages/audit/*|\
              packages/auth/*|\
              packages/backup-restore/*|\
              packages/instance-bootstrap/*|\
              packages/machine-auth/*|\
              packages/notifications/*|\
              packages/onboarding/*|\
              packages/operations/*|\
              packages/protected-change/*|\
              packages/runtime-injection/*|\
              packages/secret-sync/*|\
              packages/secret-store/*|\
              packages/tenant-store/*|\
              compose.yaml|\
              infra/postgres/*|\
              package.json|\
              pnpm-lock.yaml|\
              pnpm-workspace.yaml|\
              scripts/ci/postgres-integration-tests.mjs|\
              scripts/dev-db.mjs|\
              scripts/local-smoke.mjs|\
              turbo.json)
                db_backed=true
                ;;
            esac
          done < <(git diff --name-only "${BASE_SHA}...HEAD")

          {
            echo "db_backed=$db_backed"
            echo "product_code=$product_code"
            echo "workflow_config=$workflow_config"
          } >> "$GITHUB_OUTPUT"

  verify:
    name: Verify
    needs: changes
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Secret scan
        run: |
          bash scripts/ci/install-gitleaks.sh
          bash scripts/ci/gitleaks-detect.sh detect

      - name: Setup pnpm
        if: needs.changes.outputs.product_code == 'true' || needs.changes.outputs.workflow_config == 'true'
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.19.0

      - name: Setup Node.js
        if: needs.changes.outputs.product_code == 'true' || needs.changes.outputs.workflow_config == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Install dependencies
        if: needs.changes.outputs.product_code == 'true' || needs.changes.outputs.workflow_config == 'true'
        run: pnpm install --frozen-lockfile

      - name: Product checks
        if: needs.changes.outputs.product_code == 'true'
        env:
          EVENT_NAME: ${{ github.event_name }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
        run: |
          set -euo pipefail
          cache_flags="--cache=local:rw,remote:r"
          if [ -n "${TURBO_REMOTE_CACHE_SIGNATURE_KEY:-}" ] && [ -n "${TURBO_TOKEN:-}" ] && [ -n "${TURBO_TEAM:-}" ]; then
            cache_flags="--cache=local:rw,remote:rw"
            echo "Remote Turbo cache writes enabled (CI-only, signed when signature key is set)."
          else
            echo "::notice::Remote Turbo cache writes skipped. Configure TURBO_TOKEN, TURBO_TEAM, and TURBO_REMOTE_CACHE_SIGNATURE_KEY repository secrets to enable signed CI cache publication (ADR-0053)."
          fi
          export TURBO_CACHE="${cache_flags#--cache=}"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            pnpm verify:pr
          else
            pnpm verify
          fi
          pnpm test:coverage

      - name: Workflow config checks
        if: needs.changes.outputs.workflow_config == 'true'
        run: |
          if [ "${{ needs.changes.outputs.product_code }}" != "true" ]; then
            pnpm exec prettier --check ".github/workflows/*.{yml,yaml}" ".github/actions/**/*.{yml,yaml}" ".github/actionlint.yaml"
            pnpm conformance:actions-pin
          fi
          bash scripts/ci/install-actionlint.sh
          actionlint -color

      - name: DB-backed tests
        if: needs.changes.outputs.product_code == 'true' && needs.changes.outputs.db_backed == 'true'
        run: |
          pnpm dev:db:reset
          node scripts/ci/postgres-integration-tests.mjs

      - name: Upload coverage report
        if: always() && needs.changes.outputs.product_code == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Docs-only short-circuit
        if: needs.changes.outputs.product_code != 'true' && needs.changes.outputs.workflow_config != 'true'
        run: echo "Docs-only change; skipping Verify."
