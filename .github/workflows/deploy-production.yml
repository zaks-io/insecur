# Deploy the production Worker fleet with the same all-app topology as Preview.
name: Deploy Production

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Production
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 25
    environment:
      name: Production
      url: ${{ steps.deploy.outputs.base_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.19.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set deploy identity
        id: deploy_identity
        run: echo "deployed_at=$(date -u +'%Y-%m-%dT%H:%M:%S.000Z')" >> "$GITHUB_OUTPUT"

      - name: Require passing CI for deployed commit
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -euo pipefail

          runs_json="$(
            curl --fail-with-body --silent --show-error \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer $GITHUB_TOKEN" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/workflows/ci.yml/runs?head_sha=$DEPLOY_SHA&status=completed&per_page=20"
          )"

          passing_runs="$(
            jq --arg sha "$DEPLOY_SHA" \
              '[.workflow_runs[] | select(.head_sha == $sha and .conclusion == "success")] | length' \
              <<<"$runs_json"
          )"

          if [ "$passing_runs" -eq 0 ]; then
            echo "::error::No completed successful CI workflow run was found for $DEPLOY_SHA. Run CI and wait for it to pass before deploying production."
            exit 1
          fi

          echo "Found $passing_runs completed successful CI workflow run(s) for $DEPLOY_SHA."

      - name: Migrate production database
        env:
          DATABASE_URL_MIGRATION: ${{ secrets.PRODUCTION_DATABASE_URL_MIGRATION }}
          INSECUR_POSTGRES_RUNTIME_ROLE: ${{ vars.PRODUCTION_POSTGRES_RUNTIME_ROLE }}
        run: pnpm migrate:production

      - name: Sync Worker secrets
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          RUNTIME_TOKEN_SIGNING_SECRET: ${{ secrets.RUNTIME_TOKEN_SIGNING_SECRET }}
          SESSION_SIGNING_SECRET: ${{ secrets.SESSION_SIGNING_SECRET }}
          WORKOS_API_KEY: ${{ secrets.WORKOS_API_KEY }}
          WORKOS_COOKIE_PASSWORD: ${{ secrets.WORKOS_COOKIE_PASSWORD }}
        run: |
          set -euo pipefail

          required=(
            CLOUDFLARE_ACCOUNT_ID
            CLOUDFLARE_API_TOKEN
            RUNTIME_TOKEN_SIGNING_SECRET
            SESSION_SIGNING_SECRET
            WORKOS_API_KEY
            WORKOS_COOKIE_PASSWORD
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is not configured in the Production GitHub Environment."
              exit 1
            fi
          done

          jq -n --arg value "$RUNTIME_TOKEN_SIGNING_SECRET" \
            '{ RUNTIME_TOKEN_SIGNING_SECRET: $value }' |
            pnpm exec wrangler secret bulk --cwd apps/runtime --name insecur-runtime --env=""

          jq -n \
            --arg runtime "$RUNTIME_TOKEN_SIGNING_SECRET" \
            --arg session "$SESSION_SIGNING_SECRET" \
            --arg workos "$WORKOS_API_KEY" \
            --arg cookie "$WORKOS_COOKIE_PASSWORD" \
            '{
              RUNTIME_TOKEN_SIGNING_SECRET: $runtime,
              SESSION_SIGNING_SECRET: $session,
              WORKOS_API_KEY: $workos,
              WORKOS_COOKIE_PASSWORD: $cookie
            }' |
            pnpm exec wrangler secret bulk --cwd apps/api --name insecur-api --env=""

          jq -n \
            --arg session "$SESSION_SIGNING_SECRET" \
            --arg workos "$WORKOS_API_KEY" \
            --arg cookie "$WORKOS_COOKIE_PASSWORD" \
            '{
              SESSION_SIGNING_SECRET: $session,
              WORKOS_API_KEY: $workos,
              WORKOS_COOKIE_PASSWORD: $cookie
            }' |
            pnpm exec wrangler secret bulk --cwd apps/web --name insecur-web --env=""

      - name: Deploy production Workers
        id: deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
          INSECUR_DEPLOY_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          INSECUR_DEPLOY_RUN_ID: ${{ github.run_id }}
          INSECUR_DEPLOYED_AT: ${{ steps.deploy_identity.outputs.deployed_at }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: zaksio
          SENTRY_PROJECT: insecur
          SENTRY_RELEASE: ${{ github.event.workflow_run.head_sha || github.sha }}
          INSECUR_INSTANCE_ID: ${{ vars.PRODUCTION_INSTANCE_ID }}
          INSECUR_WORKOS_CLIENT_ID: ${{ vars.WORKOS_CLIENT_ID }}
          INSECUR_API_RATELIMIT_ONBOARDING_IP_NAMESPACE_ID: ${{ vars.PRODUCTION_API_RATELIMIT_ONBOARDING_IP_NAMESPACE_ID }}
          INSECUR_API_RATELIMIT_ONBOARDING_ACTOR_NAMESPACE_ID: ${{ vars.PRODUCTION_API_RATELIMIT_ONBOARDING_ACTOR_NAMESPACE_ID }}
          INSECUR_API_RATELIMIT_BOOTSTRAP_IP_NAMESPACE_ID: ${{ vars.PRODUCTION_API_RATELIMIT_BOOTSTRAP_IP_NAMESPACE_ID }}
          INSECUR_API_RATELIMIT_BOOTSTRAP_ACTOR_NAMESPACE_ID: ${{ vars.PRODUCTION_API_RATELIMIT_BOOTSTRAP_ACTOR_NAMESPACE_ID }}
          INSECUR_API_RATELIMIT_AUTH_EXCHANGE_IP_NAMESPACE_ID: ${{ vars.PRODUCTION_API_RATELIMIT_AUTH_EXCHANGE_IP_NAMESPACE_ID }}
          INSECUR_RUNTIME_ROOT_KEY_STORE_ID: ${{ vars.PRODUCTION_RUNTIME_ROOT_KEY_STORE_ID }}
          INSECUR_RUNTIME_ROOT_KEY_SECRET_NAME: ${{ vars.PRODUCTION_RUNTIME_ROOT_KEY_SECRET_NAME }}
          INSECUR_RUNTIME_HYPERDRIVE_ID: ${{ vars.PRODUCTION_HYPERDRIVE_ID }}
        run: |
          set -euo pipefail

          required=(
            CLOUDFLARE_ACCOUNT_ID
            CLOUDFLARE_API_TOKEN
            SENTRY_AUTH_TOKEN
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is not configured in the Production GitHub Environment."
              exit 1
            fi
          done

          pnpm deploy:production
          echo "base_url=https://app.insecur.cloud" >> "$GITHUB_OUTPUT"
