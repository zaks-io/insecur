# Reusable Production deployment stage for the daily release train.
name: Deploy Production

on:
  workflow_call:
    inputs:
      ci_run_id:
        description: Successful CI run that proved the deployed commit
        required: true
        type: string
      deploy_sha:
        description: Exact Preview-proven main commit to deploy
        required: true
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Production
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    env:
      RELEASE_ID: ${{ inputs.deploy_sha }}
    environment:
      name: Production
      url: ${{ steps.deploy.outputs.base_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ env.RELEASE_ID }}
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.19.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set deploy identity
        id: deploy_identity
        run: echo "deployed_at=$(date -u +'%Y-%m-%dT%H:%M:%S.000Z')" >> "$GITHUB_OUTPUT"

      - name: Download Preview Smoke evidence
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: preview-smoke-artifacts
          path: preview-smoke-evidence

      - name: Require verified Preview fleet identity
        env:
          DEPLOY_SHA: ${{ env.RELEASE_ID }}
        run: |
          set -euo pipefail

          proof_path="$(find preview-smoke-evidence -type f -name deploy-identity.json -print -quit)"
          if [ -z "$proof_path" ]; then
            echo "::error::Preview Smoke did not publish deploy identity proof."
            exit 1
          fi

          # pnpm --filter runs with cwd=packages/release-gate, so evidence paths must be absolute.
          pnpm --filter @insecur/release-gate verify-preview-smoke-identity \
            --evidence "$GITHUB_WORKSPACE/$proof_path" \
            --expected-sha "$DEPLOY_SHA"

      - name: Download coverage badge evidence
        env:
          GH_TOKEN: ${{ github.token }}
          CI_RUN_ID: ${{ inputs.ci_run_id }}
        run: |
          set -euo pipefail

          rm -rf coverage-report
          mkdir -p coverage-report apps/site/src/generated
          if ! gh run download "$CI_RUN_ID" --name coverage-report --dir coverage-report; then
            echo "::notice::CI run $CI_RUN_ID has no coverage-report artifact; preserving the currently published coverage badge if available."
          fi

          badge_source="$(find coverage-report -type f -name coverage-badge.json | head -n1 || true)"
          if [ -z "$badge_source" ] || [ ! -s "$badge_source" ]; then
            if curl --fail --silent --show-error --location \
              --output apps/site/src/generated/coverage-badge.json \
              https://insecur.cloud/badges/coverage.json; then
              echo "Preserved the currently published coverage badge."
            else
              echo "::notice::No published coverage badge exists yet; deploying the checked-in unknown badge."
            fi
            exit 0
          fi

          cp "$badge_source" apps/site/src/generated/coverage-badge.json

      # Advisory during prelaunch while this environment has no users or valuable production data.
      # Remove --warn-only before relying on insecur for valuable production secrets.
      - name: Evaluate small-group production security release gate
        run: |
          pnpm release-gate:bundle -- --profile small_group_production --evidence-dir "$GITHUB_WORKSPACE/evidence" --warn-only
          echo "::warning::Small-group production evidence is advisory during prelaunch. Enforce this gate before storing valuable production secrets."

      - name: Migrate production database
        env:
          DATABASE_URL_MIGRATION: ${{ secrets.PRODUCTION_DATABASE_URL_MIGRATION }}
          INSECUR_POSTGRES_RUNTIME_ROLE: ${{ vars.PRODUCTION_POSTGRES_RUNTIME_ROLE }}
        run: pnpm migrate:production

      - name: Sync Worker secrets
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          RUNTIME_TOKEN_SIGNING_SECRET: ${{ secrets.RUNTIME_TOKEN_SIGNING_SECRET }}
          SESSION_SIGNING_SECRET: ${{ secrets.SESSION_SIGNING_SECRET }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
          WORKOS_API_KEY: ${{ secrets.WORKOS_API_KEY }}
          WORKOS_COOKIE_PASSWORD: ${{ secrets.WORKOS_COOKIE_PASSWORD }}
        run: |
          set -euo pipefail

          required=(
            CLOUDFLARE_ACCOUNT_ID
            CLOUDFLARE_API_TOKEN
            RUNTIME_TOKEN_SIGNING_SECRET
            SESSION_SIGNING_SECRET
            TURNSTILE_SECRET_KEY
            WORKOS_API_KEY
            WORKOS_COOKIE_PASSWORD
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is not configured in the Production GitHub Environment."
              exit 1
            fi
          done

          jq -n --arg value "$RUNTIME_TOKEN_SIGNING_SECRET" \
            '{ RUNTIME_TOKEN_SIGNING_SECRET: $value }' |
            pnpm exec wrangler secret bulk --cwd apps/runtime --name insecur-runtime --env=""

          jq -n \
            --arg runtime "$RUNTIME_TOKEN_SIGNING_SECRET" \
            --arg session "$SESSION_SIGNING_SECRET" \
            --arg workos "$WORKOS_API_KEY" \
            --arg cookie "$WORKOS_COOKIE_PASSWORD" \
            '{
              RUNTIME_TOKEN_SIGNING_SECRET: $runtime,
              SESSION_SIGNING_SECRET: $session,
              WORKOS_API_KEY: $workos,
              WORKOS_COOKIE_PASSWORD: $cookie
            }' |
            pnpm exec wrangler secret bulk --cwd apps/api --name insecur-api --env=""

          jq -n \
            --arg session "$SESSION_SIGNING_SECRET" \
            --arg turnstile "$TURNSTILE_SECRET_KEY" \
            --arg workos "$WORKOS_API_KEY" \
            --arg cookie "$WORKOS_COOKIE_PASSWORD" \
            '{
              SESSION_SIGNING_SECRET: $session,
              TURNSTILE_SECRET_KEY: $turnstile,
              WORKOS_API_KEY: $workos,
              WORKOS_COOKIE_PASSWORD: $cookie
            }' |
            pnpm exec wrangler secret bulk --cwd apps/web --name insecur-web --env=""

      - name: Deploy production Workers
        id: deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
          TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
          INSECUR_DEPLOY_SHA: ${{ env.RELEASE_ID }}
          INSECUR_DEPLOY_RUN_ID: ${{ github.run_id }}
          INSECUR_DEPLOYED_AT: ${{ steps.deploy_identity.outputs.deployed_at }}
          INSECUR_REQUIRE_SENTRY_SOURCEMAPS: "true"
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: zaksio
          SENTRY_PROJECT: insecur
          SENTRY_RELEASE: ${{ env.RELEASE_ID }}
          INSECUR_INSTANCE_ID: ${{ vars.PRODUCTION_INSTANCE_ID }}
          INSECUR_SITE_AUDIT_EXPORT_SIGNING_PUBLIC_KEY: ${{ vars.PRODUCTION_SITE_AUDIT_EXPORT_SIGNING_PUBLIC_KEY }}
          INSECUR_TURNSTILE_SITE_KEY: ${{ vars.TURNSTILE_SITE_KEY }}
          INSECUR_WORKOS_CLIENT_ID: ${{ vars.WORKOS_CLIENT_ID }}
          INSECUR_WORKOS_AUTHKIT_ORIGIN: ${{ vars.WORKOS_AUTHKIT_ORIGIN }}
          INSECUR_API_RATELIMIT_ONBOARDING_IP_NAMESPACE_ID: ${{ vars.PRODUCTION_API_RATELIMIT_ONBOARDING_IP_NAMESPACE_ID }}
          INSECUR_API_RATELIMIT_ONBOARDING_ACTOR_NAMESPACE_ID: ${{ vars.PRODUCTION_API_RATELIMIT_ONBOARDING_ACTOR_NAMESPACE_ID }}
          INSECUR_API_RATELIMIT_BOOTSTRAP_IP_NAMESPACE_ID: ${{ vars.PRODUCTION_API_RATELIMIT_BOOTSTRAP_IP_NAMESPACE_ID }}
          INSECUR_API_RATELIMIT_BOOTSTRAP_ACTOR_NAMESPACE_ID: ${{ vars.PRODUCTION_API_RATELIMIT_BOOTSTRAP_ACTOR_NAMESPACE_ID }}
          INSECUR_API_RATELIMIT_AUTH_EXCHANGE_IP_NAMESPACE_ID: ${{ vars.PRODUCTION_API_RATELIMIT_AUTH_EXCHANGE_IP_NAMESPACE_ID }}
          INSECUR_API_RATELIMIT_AUTH_DEVICE_TOKEN_IP_NAMESPACE_ID: ${{ vars.PRODUCTION_API_RATELIMIT_AUTH_DEVICE_TOKEN_IP_NAMESPACE_ID }}
          INSECUR_RUNTIME_ROOT_KEY_STORE_ID: ${{ vars.PRODUCTION_RUNTIME_ROOT_KEY_STORE_ID }}
          INSECUR_RUNTIME_ROOT_KEY_SECRET_NAME: ${{ vars.PRODUCTION_RUNTIME_ROOT_KEY_SECRET_NAME }}
          INSECUR_RUNTIME_AUDIT_EXPORT_HMAC_SECRET_NAME: ${{ vars.PRODUCTION_RUNTIME_AUDIT_EXPORT_HMAC_SECRET_NAME }}
          INSECUR_RUNTIME_AUDIT_EXPORT_SIGNING_SECRET_NAME: ${{ vars.PRODUCTION_RUNTIME_AUDIT_EXPORT_SIGNING_SECRET_NAME }}
          INSECUR_RUNTIME_BACKUPS_BUCKET_NAME: ${{ vars.PRODUCTION_RUNTIME_BACKUPS_BUCKET_NAME }}
          INSECUR_RUNTIME_HYPERDRIVE_ID: ${{ vars.PRODUCTION_HYPERDRIVE_ID }}
        run: |
          set -euo pipefail

          required=(
            CLOUDFLARE_ACCOUNT_ID
            CLOUDFLARE_API_TOKEN
            INSECUR_TURNSTILE_SITE_KEY
            INSECUR_RUNTIME_BACKUPS_BUCKET_NAME
            SENTRY_AUTH_TOKEN
          )
          for name in "${required[@]}"; do
            if [ -z "${!name:-}" ]; then
              if [ "$name" = "SENTRY_AUTH_TOKEN" ]; then
                echo "::error::$name is not configured for this deploy job. Add the repository Actions secret or an optional Production environment override."
              else
                echo "::error::$name is not configured in the Production GitHub Environment."
              fi
              exit 1
            fi
          done

          pnpm deploy:production
          echo "base_url=https://app.insecur.cloud" >> "$GITHUB_OUTPUT"

      - name: Verify Sentry source maps for production release
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: zaksio
          SENTRY_PROJECT: insecur
          SENTRY_RELEASE: ${{ env.RELEASE_ID }}
        run: node scripts/sentry-verify-release-sourcemaps.mjs

      - name: Verify production fleet identity
        run: node scripts/ci/verify-production-health.mjs "${{ env.RELEASE_ID }}"

      - name: Sync production release to Linear
        uses: linear/linear-release-action@c0cb8354a362c24c6d3e0948f37fd66d07588e3f # v0.14.5
        with:
          access_key: ${{ secrets.LINEAR_ACCESS_KEY }}
          name: ${{ env.RELEASE_ID }}
          version: ${{ env.RELEASE_ID }}
          include_paths: "apps/api/**,apps/runtime/**,apps/site/**,apps/web/**,packages/access/**,packages/agent-attribution/**,packages/app-connection/**,packages/audit/**,packages/auth/**,packages/backup-restore/**,packages/crypto/**,packages/custody-contracts/**,packages/domain/**,packages/high-assurance/**,packages/instance-bootstrap/**,packages/machine-auth/**,packages/notifications/**,packages/observability/**,packages/onboarding/**,packages/operations/**,packages/protected-change/**,packages/runtime-injection/**,packages/runtime-injection-issue/**,packages/secret-store/**,packages/secret-store-contracts/**,packages/secret-sync/**,packages/storage-security-gate/**,packages/tenant-keyring/**,packages/tenant-store/**,packages/token-signing/**,packages/ui/**,packages/worker-kit/**"
