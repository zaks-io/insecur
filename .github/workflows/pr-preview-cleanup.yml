# Tear down per-PR preview resources on PR close, plus a scheduled janitor for
# orphans. GATED to match pr-preview.yml: only runs when PREVIEW_ENV_ENABLED == 'true'.
#
# Deletes BOTH split Workers (insecur-api-pr-N + insecur-runtime-pr-N), the per-PR
# Hyperdrive (BY EXACT NAME — never by position), and the Neon branch.
name: PR Preview Cleanup

on:
  pull_request:
    types:
      - closed
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to clean up
        required: false
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-preview-cleanup-${{ github.event.pull_request.number || inputs.pr_number }}
  cancel-in-progress: false

env:
  CI: "true"
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  cleanup:
    name: Cleanup PR Preview
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    if: ${{ vars.PREVIEW_ENV_ENABLED == 'true' && ((github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) || (github.event_name == 'workflow_dispatch' && inputs.pr_number != '')) }}
    environment: Preview

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve PR number
        id: pr
        env:
          RESOLVED_PR_NUMBER: ${{ github.event.pull_request.number || inputs.pr_number }}
        run: |
          if ! [[ "$RESOLVED_PR_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::Resolved PR number is not a positive integer: '$RESOLVED_PR_NUMBER'"
            exit 1
          fi
          echo "number=$RESOLVED_PR_NUMBER" >> "$GITHUB_OUTPUT"

      # Delete BOTH split Workers. The runtime is reached only via the API's Service Binding, but
      # both are independent deploys and must be torn down.
      - name: Delete preview Workers
        if: ${{ always() && steps.pr.outputs.number != '' }}
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: |
          for worker_name in "insecur-api-pr-${PR_NUMBER}" "insecur-runtime-pr-${PR_NUMBER}"; do
            pnpm exec wrangler delete --name "$worker_name" || echo "Worker $worker_name already removed"
          done

      # Delete the per-PR Hyperdrive BY EXACT NAME. delete-hyperdrive.mjs resolves
      # insecur-db-pr-N by name and deletes only that id — it can never select a shared/production
      # config by position (the landmine the old `list | grep | head -1` carried).
      - name: Delete preview Hyperdrive
        if: ${{ always() && steps.pr.outputs.number != '' }}
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        run: node scripts/ci/delete-hyperdrive.mjs --name "insecur-db-pr-${PR_NUMBER}"

      - name: Delete Neon PR branch
        if: ${{ always() && steps.pr.outputs.number != '' }}
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: node scripts/ci/delete-neon-pr-branch.mjs

  reconcile-stale:
    name: Reconcile Stale PR Previews
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 20
    if: ${{ vars.PREVIEW_ENV_ENABLED == 'true' && (github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.pr_number == '')) }}
    environment: Preview

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Reconcile orphaned preview resources for PRs that are already closed. Resolves each
      # per-PR resource BY NAME against the set of open PRs, so it never touches shared/production
      # Workers or Hyperdrive configs. Reuses delete-hyperdrive.mjs (name-matched) for safety.
      - name: Reconcile orphaned previews
        env:
          GH_TOKEN: ${{ github.token }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: node scripts/ci/reconcile-stale-previews.mjs
