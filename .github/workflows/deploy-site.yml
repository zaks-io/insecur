# Deploy the Public Site Worker (@insecur/site / insecur-site, ADR-0078). This is intentionally
# SEPARATE from Deploy Preview: the Public Site has no database, keyring, API/Runtime binding, or
# First Value smoke. Preview is the default target. Production is gated behind an explicit input and
# the protected `Site Production` environment, and is never auto-published on a `main` push until the
# legal/security publication gates settle.
name: Deploy Site

on:
  workflow_dispatch:
    inputs:
      target:
        description: Which site environment to deploy
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

permissions:
  contents: read

concurrency:
  group: deploy-site-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Site (${{ inputs.target }})
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    environment:
      name: ${{ inputs.target == 'production' && 'Site Production' || 'Site Preview' }}
      url: ${{ steps.deploy.outputs.base_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.19.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy site
        id: deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DEPLOY_TARGET: ${{ inputs.target }}
        run: |
          if [ "$DEPLOY_TARGET" = "production" ]; then
            pnpm deploy:site:prod
            echo "base_url=https://insecur.cloud" >> "$GITHUB_OUTPUT"
          else
            pnpm deploy:site
            echo "base_url=https://preview.insecur.cloud" >> "$GITHUB_OUTPUT"
          fi
