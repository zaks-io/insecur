# Deploy the Public Site Worker (@insecur/site / insecur-site, ADR-0078). This is intentionally
# SEPARATE from Deploy Preview and from API/Runtime production deploys: the Public Site has no
# database, keyring, API/Runtime binding, or First Value smoke. Pushes to `main` run CI first, then
# auto-publish only the public marketing site to the apex production domain after CI succeeds.
name: Deploy Site

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      target:
        description: Which site environment to deploy
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production

permissions:
  contents: read

concurrency:
  group: deploy-site-${{ github.event_name == 'workflow_run' && 'production' || inputs.target }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Site (${{ github.event_name == 'workflow_run' && 'production' || inputs.target }})
    if: github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15
    environment:
      name: ${{ (github.event_name == 'workflow_run' || inputs.target == 'production') && 'Production' || 'Preview' }}
      url: ${{ steps.deploy.outputs.base_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.19.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy site
        id: deploy
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          DEPLOY_TARGET: ${{ github.event_name == 'workflow_run' && 'production' || inputs.target }}
        run: |
          if [ "$DEPLOY_TARGET" = "production" ]; then
            pnpm deploy:site:prod
            echo "base_url=https://insecur.cloud" >> "$GITHUB_OUTPUT"
          else
            pnpm deploy:site
            echo "base_url=https://preview.insecur.cloud" >> "$GITHUB_OUTPUT"
          fi
