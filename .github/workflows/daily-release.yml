# One idempotent release train owns candidate selection, Preview proof, Production deploy,
# and the production branch ledger. Individual stages are reusable but not dispatchable.
name: Daily Release

on:
  schedule:
    - cron: "43 8 * * *"
      timezone: America/Los_Angeles
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: daily-release
  cancel-in-progress: false

jobs:
  select:
    name: Select release candidate
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    outputs:
      action: ${{ steps.candidate.outputs.action }}
      ci_run_id: ${{ steps.candidate.outputs.ci_run_id }}
      deploy_sha: ${{ steps.candidate.outputs.deploy_sha }}
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: main

      - name: Fetch production ledger
        run: git fetch --no-tags origin refs/heads/production:refs/remotes/origin/production

      - name: Select newest CI-green main commit
        id: candidate
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/ci/select-release-candidate.mjs

      - name: Upload candidate evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-candidate
          path: release-candidate.json
          retention-days: 30

  preview:
    name: Stage Preview
    needs: select
    if: needs.select.outputs.action == 'deploy'
    permissions:
      contents: read
    uses: ./.github/workflows/deploy-preview.yml
    with:
      deploy_sha: ${{ needs.select.outputs.deploy_sha }}
    secrets: inherit

  smoke:
    name: Prove Preview
    needs:
      - select
      - preview
    if: needs.select.outputs.action == 'deploy'
    permissions:
      contents: read
    uses: ./.github/workflows/preview-smoke.yml
    with:
      deploy_sha: ${{ needs.select.outputs.deploy_sha }}
    secrets: inherit

  production:
    name: Release Production
    needs:
      - select
      - smoke
    if: needs.select.outputs.action == 'deploy'
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/deploy-production.yml
    with:
      ci_run_id: ${{ needs.select.outputs.ci_run_id }}
      deploy_sha: ${{ needs.select.outputs.deploy_sha }}
    secrets: inherit

  finalize:
    name: Record production release
    needs:
      - select
      - production
    if: >-
      always() &&
      needs.select.result == 'success' &&
      (needs.select.outputs.action == 'record' ||
       (needs.select.outputs.action == 'deploy' && needs.production.result == 'success'))
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      contents: write
      statuses: write
    steps:
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: main

      - name: Fast-forward production ledger
        env:
          DEPLOY_SHA: ${{ needs.select.outputs.deploy_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin refs/heads/production:refs/remotes/origin/production
          current_sha="$(git rev-parse refs/remotes/origin/production)"
          if [ "$current_sha" = "$DEPLOY_SHA" ]; then
            echo "production already records $DEPLOY_SHA."
            exit 0
          fi
          if git merge-base --is-ancestor "$DEPLOY_SHA" "$current_sha"; then
            echo "production already records a newer release $current_sha; refusing rollback."
            exit 0
          fi
          if ! git merge-base --is-ancestor "$current_sha" "$DEPLOY_SHA"; then
            echo "::error::production $current_sha and release $DEPLOY_SHA have diverged."
            exit 1
          fi
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$DEPLOY_SHA" \
            -f state=success \
            -f context="Production release verified" \
            -f description="Daily Release verified Production" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          gh api --method PATCH \
            "repos/$GITHUB_REPOSITORY/git/refs/heads/production" \
            -f sha="$DEPLOY_SHA" \
            -F force=false

  no_change:
    name: No release needed
    needs: select
    if: needs.select.outputs.action == 'noop'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 2
    steps:
      - run: echo "Production already contains the newest CI-green main release."
