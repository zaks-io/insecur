# One idempotent release train owns candidate selection, Preview proof, Production deploy,
# and the production branch ledger. Individual stages are reusable but not dispatchable.
name: Daily Release

on:
  schedule:
    - cron: "43 8 * * *"
      timezone: America/Los_Angeles
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: daily-release
  cancel-in-progress: false

jobs:
  select:
    name: Select release candidate
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    outputs:
      action: ${{ steps.candidate.outputs.action }}
      ci_run_id: ${{ steps.candidate.outputs.ci_run_id }}
      deploy_sha: ${{ steps.candidate.outputs.deploy_sha }}
    steps:
      - name: Checkout main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          ref: main

      - name: Fetch production ledger
        run: git fetch --no-tags origin refs/heads/production:refs/remotes/origin/production

      - name: Select newest CI-green main commit
        id: candidate
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/ci/select-release-candidate.mjs

      - name: Upload candidate evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: release-candidate
          path: release-candidate.json
          retention-days: 30

  preview:
    name: Stage Preview
    needs: select
    if: needs.select.outputs.action == 'deploy'
    permissions:
      contents: read
    uses: ./.github/workflows/deploy-preview.yml
    with:
      deploy_sha: ${{ needs.select.outputs.deploy_sha }}
    secrets:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      PREVIEW_DATABASE_URL_MIGRATION: ${{ secrets.PREVIEW_DATABASE_URL_MIGRATION }}
      RUNTIME_TOKEN_SIGNING_SECRET: ${{ secrets.RUNTIME_TOKEN_SIGNING_SECRET }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SESSION_SIGNING_SECRET: ${{ secrets.SESSION_SIGNING_SECRET }}
      TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
      WORKOS_API_KEY: ${{ secrets.WORKOS_API_KEY }}
      WORKOS_COOKIE_PASSWORD: ${{ secrets.WORKOS_COOKIE_PASSWORD }}

  smoke:
    name: Prove Preview
    needs:
      - select
      - preview
    if: needs.select.outputs.action == 'deploy'
    permissions:
      contents: read
    uses: ./.github/workflows/preview-smoke.yml
    with:
      deploy_sha: ${{ needs.select.outputs.deploy_sha }}
    secrets:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      PREVIEW_DATABASE_URL_MIGRATION: ${{ secrets.PREVIEW_DATABASE_URL_MIGRATION }}
      SESSION_SIGNING_SECRET: ${{ secrets.SESSION_SIGNING_SECRET }}

  smoke_gate:
    name: Require Preview proof
    needs:
      - select
      - smoke
    if: >-
      always() &&
      needs.select.result == 'success' &&
      needs.select.outputs.action == 'deploy'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 2
    steps:
      - name: Require Preview proof
        env:
          PREVIEW_PROOF_PASSED: ${{ needs.smoke.outputs.proof_passed }}
          PREVIEW_SMOKE_RESULT: ${{ needs.smoke.result }}
        run: |
          set -euo pipefail
          if [ "$PREVIEW_SMOKE_RESULT" != "success" ] || [ "$PREVIEW_PROOF_PASSED" != "true" ]; then
            echo "::error::Preview proof failed. The deployed Preview fleet remains recorded separately."
            exit 1
          fi

  linear_preview:
    name: Record Preview release in Linear
    needs:
      - select
      - smoke_gate
    if: needs.select.outputs.action == 'deploy'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    environment: Preview
    permissions:
      contents: read
    steps:
      - name: Checkout release candidate
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.select.outputs.deploy_sha }}

      - name: Fetch production release baseline
        run: git fetch --no-tags origin refs/heads/production:refs/remotes/origin/production

      - name: Sync Preview release to Linear
        uses: linear/linear-release-action@c0cb8354a362c24c6d3e0948f37fd66d07588e3f # v0.14.5
        with:
          access_key: ${{ secrets.LINEAR_ACCESS_KEY }}
          command: sync
          name: ${{ needs.select.outputs.deploy_sha }}
          version: ${{ needs.select.outputs.deploy_sha }}
          base_ref: refs/remotes/origin/production
          include_paths: "apps/api/**,apps/runtime/**,apps/site/**,apps/web/**,packages/access/**,packages/agent-attribution/**,packages/app-connection/**,packages/audit/**,packages/auth/**,packages/backup-restore/**,packages/crypto/**,packages/custody-contracts/**,packages/domain/**,packages/high-assurance/**,packages/instance-bootstrap/**,packages/machine-auth/**,packages/notifications/**,packages/observability/**,packages/onboarding/**,packages/operations/**,packages/protected-change/**,packages/runtime-injection/**,packages/runtime-injection-issue/**,packages/secret-store/**,packages/secret-store-contracts/**,packages/secret-sync/**,packages/storage-security-gate/**,packages/tenant-keyring/**,packages/tenant-store/**,packages/token-signing/**,packages/ui/**,packages/worker-kit/**"
          links: |
            Daily Release=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Commit=${{ github.server_url }}/${{ github.repository }}/commit/${{ needs.select.outputs.deploy_sha }}

  production:
    name: Release Production
    needs:
      - select
      - smoke_gate
      - linear_preview
    if: needs.select.outputs.action == 'deploy'
    permissions:
      actions: read
      contents: read
    uses: ./.github/workflows/deploy-production.yml
    with:
      ci_run_id: ${{ needs.select.outputs.ci_run_id }}
      deploy_sha: ${{ needs.select.outputs.deploy_sha }}
      orchestrator_sha: ${{ github.workflow_sha }}
    secrets:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      PRODUCTION_DATABASE_URL_MIGRATION: ${{ secrets.PRODUCTION_DATABASE_URL_MIGRATION }}
      RUNTIME_TOKEN_SIGNING_SECRET: ${{ secrets.RUNTIME_TOKEN_SIGNING_SECRET }}
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SESSION_SIGNING_SECRET: ${{ secrets.SESSION_SIGNING_SECRET }}
      TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ secrets.TURBO_REMOTE_CACHE_SIGNATURE_KEY }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
      WORKOS_API_KEY: ${{ secrets.WORKOS_API_KEY }}
      WORKOS_COOKIE_PASSWORD: ${{ secrets.WORKOS_COOKIE_PASSWORD }}

  linear_production:
    name: Record Production release in Linear
    needs:
      - select
      - production
    if: >-
      always() &&
      needs.select.result == 'success' &&
      (needs.select.outputs.action == 'record' ||
       (needs.select.outputs.action == 'deploy' && needs.production.result == 'success'))
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 5
    environment: Production
    permissions:
      contents: read
    steps:
      - name: Checkout release candidate
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ needs.select.outputs.deploy_sha }}

      - name: Fetch production release baseline
        run: git fetch --no-tags origin refs/heads/production:refs/remotes/origin/production

      - name: Sync Production release to Linear
        uses: linear/linear-release-action@c0cb8354a362c24c6d3e0948f37fd66d07588e3f # v0.14.5
        with:
          access_key: ${{ secrets.LINEAR_ACCESS_KEY }}
          command: sync
          name: ${{ needs.select.outputs.deploy_sha }}
          version: ${{ needs.select.outputs.deploy_sha }}
          base_ref: refs/remotes/origin/production
          include_paths: "apps/api/**,apps/runtime/**,apps/site/**,apps/web/**,packages/access/**,packages/agent-attribution/**,packages/app-connection/**,packages/audit/**,packages/auth/**,packages/backup-restore/**,packages/crypto/**,packages/custody-contracts/**,packages/domain/**,packages/high-assurance/**,packages/instance-bootstrap/**,packages/machine-auth/**,packages/notifications/**,packages/observability/**,packages/onboarding/**,packages/operations/**,packages/protected-change/**,packages/runtime-injection/**,packages/runtime-injection-issue/**,packages/secret-store/**,packages/secret-store-contracts/**,packages/secret-sync/**,packages/storage-security-gate/**,packages/tenant-keyring/**,packages/tenant-store/**,packages/token-signing/**,packages/ui/**,packages/worker-kit/**"
          links: |
            Daily Release=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Commit=${{ github.server_url }}/${{ github.repository }}/commit/${{ needs.select.outputs.deploy_sha }}

  finalize:
    name: Record production release
    needs:
      - select
      - production
      - linear_production
    if: >-
      always() &&
      needs.select.result == 'success' &&
      needs.linear_production.result == 'success' &&
      (needs.select.outputs.action == 'record' ||
       (needs.select.outputs.action == 'deploy' && needs.production.result == 'success'))
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 5
    permissions:
      contents: write
      statuses: write
    steps:
      - name: Checkout main
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          ref: main

      - name: Fast-forward production ledger
        env:
          DEPLOY_SHA: ${{ needs.select.outputs.deploy_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git fetch --no-tags origin refs/heads/production:refs/remotes/origin/production
          current_sha="$(git rev-parse refs/remotes/origin/production)"
          if [ "$current_sha" = "$DEPLOY_SHA" ]; then
            echo "production already records $DEPLOY_SHA."
            exit 0
          fi
          if git merge-base --is-ancestor "$DEPLOY_SHA" "$current_sha"; then
            echo "production already records a newer release $current_sha; refusing rollback."
            exit 0
          fi
          if ! git merge-base --is-ancestor "$current_sha" "$DEPLOY_SHA"; then
            echo "::error::production $current_sha and release $DEPLOY_SHA have diverged."
            exit 1
          fi
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/statuses/$DEPLOY_SHA" \
            -f state=success \
            -f context="Production release verified" \
            -f description="Daily Release verified Production" \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          gh api --method PATCH \
            "repos/$GITHUB_REPOSITORY/git/refs/heads/production" \
            -f sha="$DEPLOY_SHA" \
            -F force=false

  no_change:
    name: No release needed
    needs: select
    if: needs.select.outputs.action == 'noop'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    timeout-minutes: 2
    steps:
      - run: echo "Production already contains the newest CI-green main release."
