# Per-PR preview deploy + First Value cloud smoke. GATED OFF until the preview
# infrastructure exists: it only runs when repo variable PREVIEW_ENV_ENABLED == 'true'.
#
# Deploys the SPLIT topology (ADR-0077): the private Runtime Worker (sole keyring +
# Hyperdrive holder) first, then the public API Worker whose RUNTIME Service Binding
# targets that per-PR runtime. Previews mirror production: two capability-isolated
# Workers reached over a private Service Binding, never a collapsed single worker.
#
# Security: every step uses only static commands or env-quoted values; no untrusted
# github.event.* input flows into run: shell. Forked PRs are skipped (secret-bearing).
name: PR Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths-ignore:
      - "docs/**"
      - "**/*.md"
      - ".claude/**"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CI: "true"
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy:
    name: Deploy PR Preview + First Value smoke
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 25
    # Gate: opt-in until preview infra is stood up. Also skip forked PRs (secrets).
    if: ${{ vars.PREVIEW_ENV_ENABLED == 'true' && github.event.pull_request.head.repo.full_name == github.repository }}
    environment:
      name: Preview
      url: ${{ steps.deploy_api.outputs.base_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.19.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Neon PR branch
        id: neon
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.pull_request.number }}
          parent_branch: main
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Verify Neon branch isolation
        env:
          NEON_BRANCH_ID: ${{ steps.neon.outputs.branch_id }}
          NEON_PRODUCTION_BRANCH_ID: ${{ vars.NEON_PRODUCTION_BRANCH_ID }}
        run: |
          test -n "$NEON_BRANCH_ID"
          if [ -n "$NEON_PRODUCTION_BRANCH_ID" ] && [ "$NEON_BRANCH_ID" = "$NEON_PRODUCTION_BRANCH_ID" ]; then
            echo "::error::PR Neon branch id matches production branch id"
            exit 1
          fi

      - name: Migrate PR database
        env:
          DATABASE_URL_MIGRATION: ${{ steps.neon.outputs.db_url }}
        run: pnpm --filter @insecur/tenant-store migrate:local

      - name: Seed preview smoke admission
        env:
          DATABASE_URL_MIGRATION: ${{ steps.neon.outputs.db_url }}
          INSTANCE_ID: inst_LOCAL_DEV
          SMOKE_WORKOS_USER_ID: ${{ vars.SMOKE_WORKOS_USER_ID }}
          SMOKE_ADMITTED_USER_ID: ${{ vars.SMOKE_ADMITTED_USER_ID }}
        run: pnpm --filter @insecur/tenant-store exec node scripts/seed-preview-smoke-admission.mjs

      - name: Create or reuse PR Hyperdrive
        id: hyperdrive
        env:
          PR_DATABASE_URL: ${{ steps.neon.outputs.db_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node scripts/ci/create-hyperdrive.mjs --name "insecur-db-pr-${PR_NUMBER}" --connection-string-env PR_DATABASE_URL --github-output hyperdrive_id

      - name: Patch preview wrangler configs
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_HYPERDRIVE_ID: ${{ steps.hyperdrive.outputs.hyperdrive_id }}
        run: node scripts/ci/patch-preview-wrangler.mjs --pr "${PR_NUMBER}" --hyperdrive-id "${PR_HYPERDRIVE_ID}"

      - name: Build Workers
        run: pnpm build

      # Deploy the private Runtime Worker FIRST: it holds the keyring + the per-PR Hyperdrive
      # binding, and the API's Service Binding resolves by deployed script name, so the runtime
      # script must already exist. It serves no public route.
      - name: Deploy preview Runtime Worker
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUNTIME_TOKEN_SIGNING_SECRET: ${{ secrets.RUNTIME_TOKEN_SIGNING_SECRET }}
        run: |
          runtime_name="insecur-runtime-pr-${PR_NUMBER}"
          pnpm exec wrangler deploy \
            --config apps/runtime/wrangler.jsonc \
            --env preview \
            --name "$runtime_name" \
            --var "RUNTIME_TOKEN_SIGNING_SECRET:${RUNTIME_TOKEN_SIGNING_SECRET}"

      # Deploy the public API Worker SECOND, with its RUNTIME Service Binding pointed (by the patch
      # step) at insecur-runtime-pr-N. WorkOS values are dummies: the smoke authenticates with a
      # self-minted ephemeral bearer (no WorkOS round-trip), and a persisted user_admissions row
      # seeded on the preview Neon branch admits it.
      - name: Deploy preview API Worker
        id: deploy_api
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CLOUDFLARE_WORKERS_SUBDOMAIN: ${{ vars.CLOUDFLARE_WORKERS_SUBDOMAIN }}
          SMOKE_SESSION_SIGNING_SECRET: ${{ secrets.SMOKE_SESSION_SIGNING_SECRET }}
          RUNTIME_TOKEN_SIGNING_SECRET: ${{ secrets.RUNTIME_TOKEN_SIGNING_SECRET }}
          SMOKE_WORKOS_USER_ID: ${{ vars.SMOKE_WORKOS_USER_ID }}
          SMOKE_ADMITTED_USER_ID: ${{ vars.SMOKE_ADMITTED_USER_ID }}
        run: |
          api_name="insecur-api-pr-${PR_NUMBER}"
          pnpm exec wrangler deploy \
            --config apps/api/wrangler.jsonc \
            --env preview \
            --name "$api_name" \
            --var "SESSION_SIGNING_SECRET:${SMOKE_SESSION_SIGNING_SECRET}" \
            --var "RUNTIME_TOKEN_SIGNING_SECRET:${RUNTIME_TOKEN_SIGNING_SECRET}" \
            --var "INSTANCE_ID:inst_LOCAL_DEV" \
            --var "WORKOS_API_KEY:sk_test" \
            --var "WORKOS_CLIENT_ID:client_test" \
            --var "WORKOS_COOKIE_PASSWORD:preview-cookie-password-at-least-32-characters"
          base_url="https://${api_name}.${CLOUDFLARE_WORKERS_SUBDOMAIN}.workers.dev"
          echo "base_url=${base_url}" >> "$GITHUB_OUTPUT"

      - name: Wait for /healthz readiness
        env:
          BASE_URL: ${{ steps.deploy_api.outputs.base_url }}
        run: |
          # Require 3 consecutive 200s before declaring ready. 404/530 are
          # expected-transient during route propagation and reset the counter.
          CURL_TIMEOUT=5
          CONSECUTIVE_REQUIRED=3
          MAX_ATTEMPTS=45
          SLEEP_SECONDS=2
          consecutive=0
          i=0
          while [ $i -lt $MAX_ATTEMPTS ]; do
            i=$((i+1))
            status=$(curl -sS -o /dev/null -w "%{http_code}" --max-time $CURL_TIMEOUT "$BASE_URL/healthz" 2>/dev/null) || status="000"
            if [ "$status" = "200" ]; then
              consecutive=$((consecutive+1))
              echo "$BASE_URL/healthz healthy ($consecutive/$CONSECUTIVE_REQUIRED) on attempt $i"
              if [ $consecutive -ge $CONSECUTIVE_REQUIRED ]; then
                echo "ready after $i attempt(s)"
                exit 0
              fi
            else
              consecutive=0
              echo "not ready (status=$status) on attempt $i, retrying..."
            fi
            sleep $SLEEP_SECONDS
          done
          echo "::error::$BASE_URL/healthz never got $CONSECUTIVE_REQUIRED consecutive healthy responses"
          exit 1

      # The root script is a stable wrapper around the API package implementation, so workspace
      # imports resolve through the package that declares them.
      - name: First Value cloud smoke
        env:
          SMOKE_BASE_URL: ${{ steps.deploy_api.outputs.base_url }}
          SMOKE_SESSION_SIGNING_SECRET: ${{ secrets.SMOKE_SESSION_SIGNING_SECRET }}
          SMOKE_WORKOS_USER_ID: ${{ vars.SMOKE_WORKOS_USER_ID }}
          SMOKE_ADMITTED_USER_ID: ${{ vars.SMOKE_ADMITTED_USER_ID }}
        run: pnpm --filter @insecur/api exec node "$GITHUB_WORKSPACE/scripts/ci/smoke-first-value.mjs"

      - name: Comment PR preview link
        uses: actions/github-script@v7
        env:
          BASE_URL: ${{ steps.deploy_api.outputs.base_url }}
          NEON_PROJECT_ID: ${{ vars.NEON_PROJECT_ID }}
          NEON_BRANCH_ID: ${{ steps.neon.outputs.branch_id }}
        with:
          script: |
            const body = [
              "insecur PR preview is ready and passed the First Value smoke.",
              "",
              `API Worker: ${process.env.BASE_URL}`,
              `Neon branch: https://console.neon.tech/app/projects/${process.env.NEON_PROJECT_ID}/branches/${process.env.NEON_BRANCH_ID}`,
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

  forked-pr:
    name: Skip Forked PR
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: ${{ vars.PREVIEW_ENV_ENABLED == 'true' && github.event.pull_request.head.repo.full_name != github.repository }}
    steps:
      - name: Explain skip
        run: echo "Skipping PR preview for forked PR - secret-bearing Cloudflare and Neon steps are not fork-safe."
