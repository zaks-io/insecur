# GitHub-native dependency updates for the private repo (ADR-0056, INS-280).
# pnpm enforces install-time minimumReleaseAge in pnpm-workspace.yaml; Dependabot
# applies the same 3-day cooldown before opening update PRs.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    groups:
      github-actions:
        patterns:
          - "*"
    labels:
      - dependencies
      - zaks-io/insecur

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 3
    # Keep package/catalog ranges stable when pnpm-lock.yaml can advance inside them.
    versioning-strategy: increase-if-necessary
    groups:
      cloudflare-workers:
        applies-to: version-updates
        patterns:
          - "@cloudflare/*"
          - "wrangler"
          - "workerd"
          - "miniflare"
        update-types:
          - minor
          - patch
      app-runtime:
        applies-to: version-updates
        patterns:
          - "hono"
          - "postgres"
          - "drizzle-*"
        update-types:
          - minor
          - patch
      react-ui:
        applies-to: version-updates
        patterns:
          - "react"
          - "react-dom"
          - "tailwind*"
          - "vite-tsconfig-paths"
        update-types:
          - minor
          - patch
      test-build-tooling:
        applies-to: version-updates
        dependency-type: development
        patterns:
          - "@eslint/*"
          - "@vitest/*"
          - "eslint*"
          - "jscpd"
          - "knip"
          - "lefthook"
          - "prettier"
          - "tsx"
          - "turbo"
          - "typescript"
          - "typescript-eslint"
          - "vite"
          - "vitest"
          - "yaml"
        update-types:
          - minor
          - patch
      production-minor-patch:
        applies-to: version-updates
        dependency-type: production
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      development-minor-patch:
        applies-to: version-updates
        dependency-type: development
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      # @types/node tracks the declared Node runtime major. A Node major upgrade is planned
      # human-owned work that updates engines, .node-version/.nvmrc, CI, and this rule together.
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"
      # typescript tracks the declared compiler baseline (TypeScript 5.x). A TypeScript major
      # upgrade is planned human-owned work that updates the pnpm catalog, shared tsconfig/lib
      # settings, and this rule together.
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"
    labels:
      - dependencies
      - zaks-io/insecur
