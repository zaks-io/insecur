name = "insecur"
main = "src/index.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "insecur"
database_id = "REPLACE_WITH_YOUR_D1_ID"
migrations_dir = "migrations"

# Secrets to set via `wrangler secret put`:
#   KEK_B64                base64-encoded 32 random bytes (master key-encrypting-key)
#   SESSION_SECRET         random 32+ bytes for signed session cookies
#   GITHUB_CLIENT_ID       OAuth app client id
#   GITHUB_CLIENT_SECRET   OAuth app client secret
#   GITHUB_ALLOWED_LOGINS  comma-separated github usernames allowed to log in
#
# Public config:
[vars]
APP_URL = "https://insecur.example.workers.dev"
