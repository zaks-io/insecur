packages:
  - "apps/*"
  - "packages/*"

onlyBuiltDependencies:
  - "@sentry/cli"
  - esbuild
  - lefthook
  - sharp
  - workerd
strictDepBuilds: true
trustPolicy: no-downgrade
blockExoticSubdeps: true
minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - esbuild
  - "@cloudflare/vite-plugin"
  - miniflare
nodeLinker: isolated

catalog:
  "@playwright/test": 1.61.1
  "@cloudflare/workers-types": ^5.20260703.1
  "@eslint/js": ^10.0.1
  "@stryker-mutator/core": ^9.6.1
  "@stryker-mutator/vitest-runner": ^9.6.1
  "@types/node": ^24.13.2
  "@cyclonedx/cyclonedx-esbuild": 1.4.2
  typescript: ^5.7.0
  turbo: ^2.10.3
  eslint: ^10.6.0
  typescript-eslint: ^8.62.1
  eslint-config-prettier: ^10.0.0
  fast-check: ^4.8.0
  prettier: ^3.9.4
  vitest: ^4.1.9
  "@vitest/coverage-v8": ^4.1.9
  vite: ^8.1.3
  esbuild: 0.28.1
  yaml: 2.9.0
  jscpd: ^4.2.4
  knip: ^6.24.0
  lefthook: ^2.1.8
  jiti: ^2.4.0
  globals: ^17.7.0
  postgres: ^3.4.0
  drizzle-orm: ^0.45.2
  drizzle-kit: ^0.31.10
